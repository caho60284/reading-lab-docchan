<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Translator</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #f5f6f7;
  margin: 0;
  padding: 16px;
}

.container {
  max-width: 700px;
  margin: auto;
}

.card {
  background: white;
  border-radius: 14px;
  padding: 14px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  margin-bottom: 12px;
}

textarea {
  width: 100%;
  border: none;
  outline: none;
  resize: none;
  font-size: 18px;
  line-height: 1.5;
}

.output {
  font-size: 18px;
  line-height: 1.5;
  color: #0b8f7a;
}

.toolbar {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  margin-top: 8px;
}

.icon-btn {
  border: none;
  background: #eef1f3;
  border-radius: 8px;
  padding: 6px 10px;
  font-size: 16px;
  cursor: pointer;
}

.icon-btn:hover {
  background: #e0e4e7;
}
</style>
</head>

<body>
<div class="container">

  <!-- INPUT -->
  <div class="card">
    <textarea id="inputText" rows="4" placeholder="Enter English text..."></textarea>
    
    <div class="toolbar">
      <button class="icon-btn" onclick="pasteText()">📋 Paste</button>
      <button class="icon-btn" onclick="clearText()">✕ Clear</button>
    </div>
  </div>

  <!-- OUTPUT -->
  <div class="card">
    <div id="outputText" class="output"></div>
  </div>

</div>

<script>
// ==== TRANSLATE FUNCTION ====
// Ganti isi fungsi ini dengan engine kamu
document.getElementById("inputText").addEventListener("input", translate);

function translate() {
  const input = document.getElementById("inputText").value;

  // contoh dummy translator
  // ganti dengan API / model kamu
  let output = input;

  // contoh rule upgrade natural
  output = output.replace(
    /not in panic, in protection/gi,
    "bukan karena panik, tapi untuk melindunginya"
  );

  document.getElementById("outputText").innerText = output;
}

// ==== CLEAR BUTTON ====
function clearText() {
  document.getElementById("inputText").value = "";
  document.getElementById("outputText").innerText = "";
  document.getElementById("inputText").focus();
}

// ==== PASTE BUTTON ====
async function pasteText() {
  try {
    const text = await navigator.clipboard.readText();
    document.getElementById("inputText").value = text;
    translate();
    document.getElementById("inputText").focus();
  } catch (err) {
    alert("Clipboard access denied");
  }
}
</script>

</body>
</html>
