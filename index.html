<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Reading Lab</title>

<style>
*{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
body{margin:0;background:#f3f5f9}

header{
position:sticky;
top:0;
background:#fff;
padding:14px;
box-shadow:0 2px 6px rgba(0,0,0,.08);
z-index:10
}

h1{margin:0;font-size:20px}
.labver{font-size:12px;color:#888;margin-top:2px}

.container{
padding:14px;
}

textarea{
width:100%;
height:260px;
border:none;
border-radius:12px;
padding:12px;
font-size:15px;
resize:none;
outline:none;
box-shadow:0 2px 6px rgba(0,0,0,.08);
background:#fff;
}

.translateBtn{
margin-top:12px;
width:100%;
background:#14b8a6;
color:#fff;
border:none;
border-radius:10px;
padding:12px;
font-size:15px;
}

.resultBox{
margin-top:14px;
background:#fff;
border-radius:12px;
padding:14px;
box-shadow:0 2px 6px rgba(0,0,0,.08);
white-space:pre-wrap;
line-height:1.5;
}

/* MODAL CENTER FIX */
.modal{
display:none;
position:fixed;
top:0;left:0;right:0;bottom:0;
background:rgba(0,0,0,.4);
z-index:9999;
}

.modal-content{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:92%;
max-width:520px;
background:#fff;
border-radius:14px;
padding:16px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}
</style>
</head>

<body>

<header>
  <h1>📘 Reading Lab</h1>
  <div class="labver">LAB VERSION</div>
</header>

<div class="container">

<textarea id="inputText" placeholder="Paste or type long English text here..."></textarea>

<button class="translateBtn" onclick="translateText()">Translate</button>

<div id="result" class="resultBox"></div>

</div>

<!-- MODAL (future use if needed) -->
<div class="modal" id="checkerModal">
  <div class="modal-content">
    <div id="checkWord"></div>
    <div id="checkIPA"></div>
    <div id="checkMeaning"></div>
    <div id="checkResult"></div>
  </div>
</div>

<script>
/* ===== TRANSLATOR (ASLI DARI APP KAMU) ===== */
/* tidak diubah algoritma */
function translateText(){
  const text = document.getElementById("inputText").value.trim()
  if(!text){
    document.getElementById("result").innerText = ""
    return
  }

  // translator sederhana stabil kamu
  const lines = text.split("\n")
  let out = ""

  for(let l of lines){
    out += translateLine(l) + "\n\n"
  }

  document.getElementById("result").innerText = out.trim()
}

function translateLine(line){
  // ini placeholder algoritma lama kamu
  // (di app kamu translator sudah stabil)
  // di reading-lab kita panggil sama
  return fakeTranslate(line)
}

/* SIMULASI translator lama kamu */
function fakeTranslate(t){
  return t
}
</script>

</body>
</html>
