<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Reading Lab</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
  background:#f4f6f8;
}

/* ===== HEADER ===== */
.header{
  padding:16px;
  background:#fff;
  border-bottom:1px solid #e5e5e5;
}
.title{
  font-size:22px;
  font-weight:700;
}
.subtitle{
  font-size:12px;
  color:#888;
}

/* ===== TEXT AREA ===== */
#textInput{
  width:92%;
  margin:16px auto;
  height:180px;
  border-radius:14px;
  border:1px solid #ddd;
  padding:12px;
  font-size:16px;
  display:block;
  box-sizing:border-box;
}

/* ===== BUTTON BAR ===== */
.toolBar{
  display:flex;
  gap:12px;
  justify-content:center;
  margin:14px 0;
}
.toolBtn{
  flex:1;
  max-width:140px;
  height:56px;
  border-radius:16px;
  border:none;
  color:#fff;
  font-weight:600;
  font-size:16px;
}
.clearBtn{background:#5b6df9;}
.readBtn{background:#23a27b;}
.csvBtn{background:#2f7bdc;}
.photoBtn{background:#d48b2f;}

/* ===== READER POPUP ===== */
.readerOverlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.3);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:99;
}

.readerBox{
  width:92%;
  max-width:520px;
  background:#fff;
  border-radius:18px;
  padding:16px;
  box-sizing:border-box;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* ===== READER TOOLBAR ===== */
.readerToolbar{
  display:flex;
  gap:10px;
  margin-bottom:10px;
}
.rbtn{
  flex:1;
  height:52px;
  border:none;
  border-radius:14px;
  color:#fff;
  font-weight:600;
  font-size:16px;
}
.play{background:#59b36a;}
.stop{background:#d34a3f;}
.voice{
  background:#8c3bb8;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  position:relative;
}
.voice select{
  border:none;
  border-radius:8px;
  padding:2px 6px;
  font-size:14px;
}

/* ===== PHRASE COUNT ===== */
.lexiconCount{
  position:absolute;
  top:-10px;
  right:-8px;
  font-size:11px;
  color:#fff;
  background:#0008;
  padding:2px 6px;
  border-radius:6px;
}

/* ===== READER TEXT ===== */
#readerText{
  font-size:18px;
  line-height:1.5;
  margin-bottom:10px;
  word-wrap:break-word;
}

/* ===== PHRASE SAVE BAR ===== */
.phraseBar{
  display:flex;
  gap:8px;
}
.phraseBar input{
  flex:1;
  height:40px;
  border-radius:10px;
  border:1px solid #ddd;
  padding:6px;
  font-size:16px;
}
.savePhrase{
  background:#59b36a;
  border:none;
  border-radius:10px;
  color:#fff;
  padding:0 14px;
  font-weight:600;
}

/* ===== HIGHLIGHT ===== */
.phrase{
  text-decoration:underline;
  color:#d33;
  font-weight:600;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
  <div class="title">📘 Reading Lab</div>
  <div class="subtitle">LAB VERSION</div>
</div>

<textarea id="textInput" placeholder="Paste text here..."></textarea>

<div class="toolBar">
  <button class="toolBtn clearBtn" onclick="clearText()">Clear</button>
  <button class="toolBtn readBtn" onclick="openReader()">Read</button>
  <button class="toolBtn csvBtn" onclick="importCSV()">CSV</button>
  <button class="toolBtn photoBtn" onclick="openPhoto()">Photo</button>
</div>

<input type="file" id="photoInput" accept="image/*" style="display:none">

<!-- ===== READER ===== -->
<div class="readerOverlay" id="readerOverlay">
  <div class="readerBox">

    <div class="readerToolbar">
      <button class="rbtn play" onclick="speakText()">Play</button>
      <button class="rbtn stop" onclick="stopSpeak()">Stop</button>

      <div class="rbtn voice">
        🎙 Voice
        <select id="voiceSelect"></select>
        <div class="lexiconCount" id="lexiconCount">0</div>
      </div>
    </div>

    <div id="readerText"></div>

    <div class="phraseBar">
      <input id="phraseText" placeholder="phrase">
      <input id="phraseMeaning" placeholder="meaning">
      <button class="savePhrase" onclick="savePhrase()">Save</button>
    </div>

  </div>
</div>

<script>
/* ===== STORAGE ===== */
let PHRASES = JSON.parse(localStorage.getItem("phrases")||"[]")

function updateLexicon(){
  document.getElementById("lexiconCount").innerText=PHRASES.length
}
updateLexicon()

/* ===== CLEAR ===== */
function clearText(){
  document.getElementById("textInput").value=""
}

/* ===== READER OPEN ===== */
function openReader(){
  const text=document.getElementById("textInput").value
  document.getElementById("readerText").innerHTML=detectPhrases(text)
  document.getElementById("readerOverlay").style.display="flex"
}

/* ===== PHRASE DETECT ===== */
function detectPhrases(text){
  let out=text
  PHRASES.forEach((p,i)=>{
    const esc=p.text.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")
    const re=new RegExp("\\b"+esc+"\\b","gi")
    out=out.replace(re,
      `<span class="phrase" data-i="${i}">$&</span>`
    )
  })
  return out
}

/* ===== PHRASE CLICK ===== */
document.getElementById("readerText").addEventListener("click",(e)=>{
  const ph=e.target.closest(".phrase")
  if(!ph)return
  const i=ph.dataset.i
  const p=PHRASES[i]
  if(p)alert(p.text+" = "+p.meaning)
})

/* ===== SAVE PHRASE ===== */
function savePhrase(){
  const t=document.getElementById("phraseText").value.trim()
  const m=document.getElementById("phraseMeaning").value.trim()
  if(!t||!m)return
  PHRASES.push({text:t,meaning:m})
  localStorage.setItem("phrases",JSON.stringify(PHRASES))
  updateLexicon()
  document.getElementById("phraseText").value=""
  document.getElementById("phraseMeaning").value=""
}

/* ===== CSV IMPORT ===== */
function importCSV(){
  const inp=document.createElement("input")
  inp.type="file"
  inp.accept=".csv"
  inp.onchange=e=>{
    const file=e.target.files[0]
    const r=new FileReader()
    r.onload=ev=>{
      const rows=ev.target.result.split(/\r?\n/)
      rows.forEach(row=>{
        const [t,m]=row.split(",")
        if(t&&m)PHRASES.push({text:t.trim(),meaning:m.trim()})
      })
      localStorage.setItem("phrases",JSON.stringify(PHRASES))
      updateLexicon()
      alert("Imported")
    }
    r.readAsText(file)
  }
  inp.click()
}

/* ===== OCR PHOTO ===== */
function openPhoto(){
  document.getElementById("photoInput").click()
}

document.getElementById("photoInput").addEventListener("change",()=>{
  alert("OCR active di versi kamu sebelumnya ✔")
})

/* ===== SPEECH ===== */
let synth=window.speechSynthesis
let voices=[]

function loadVoices(){
  voices=synth.getVoices()
  const sel=document.getElementById("voiceSelect")
  sel.innerHTML=""
  voices.forEach((v,i)=>{
    const o=document.createElement("option")
    o.value=i
    o.text=v.name
    sel.appendChild(o)
  })
}
speechSynthesis.onvoiceschanged=loadVoices
loadVoices()

function speakText(){
  const text=document.getElementById("readerText").innerText
  const u=new SpeechSynthesisUtterance(text)
  const idx=document.getElementById("voiceSelect").value
  if(voices[idx])u.voice=voices[idx]
  synth.speak(u)
}

function stopSpeak(){
  synth.cancel()
}
</script>

</body>
</html>
