<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reading Lab</title>

<style>
*{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
body{margin:0;background:#f3f5f9;color:#222;overflow-x:hidden}

header{
position:sticky;top:0;
background:#fff;
padding:16px 14px 10px;
box-shadow:0 2px 6px rgba(0,0,0,.08);
z-index:10
}

h1{margin:0;font-size:22px}
.lab{font-size:12px;color:#888;margin-top:2px}

.main{padding:14px}

textarea{
width:100%;
min-height:200px;
border-radius:14px;
border:1px solid #ddd;
padding:14px;
font-size:16px;
line-height:1.5;
resize:vertical;
background:#fff
}

.btnRow{
display:flex;
gap:12px;
margin-top:12px;
}

.btn{
flex:1;
height:54px;
border:none;
border-radius:14px;
font-size:17px;
color:#fff;
display:flex;
align-items:center;
justify-content:center;
gap:8px;
}

.btnRead{background:#26a69a}
.btnClear{background:linear-gradient(135deg,#7b61ff,#5a8dee)}
.btnImport{background:#2f86d6}
.btnPhoto{background:#ff9800}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.35);
display:none;
align-items:center;
justify-content:center;
padding:18px;
overflow:hidden;
}

.box{
background:#fff;
width:100%;
max-width:560px;
border-radius:18px;
padding:20px 18px 18px;
position:relative;
max-height:85vh;
overflow:auto;
box-shadow:0 10px 30px rgba(0,0,0,.15)
}

.closeX{
position:absolute;
top:10px;
right:12px;
font-size:20px;
color:#999;
cursor:pointer
}

.sentence{
margin-bottom:12px;
line-height:1.6;
cursor:pointer;
padding:6px 6px;
border-radius:8px;
}

.phrase{
text-decoration:underline;
color:#e53935;
font-weight:600;
cursor:pointer;
}

.readerToolbar{
display:flex;
gap:12px;
margin-bottom:14px;
}

.toolBtn{
height:56px;
border:none;
border-radius:18px;
font-size:18px;
font-weight:600;
color:#fff;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
padding:0 18px;
white-space:nowrap;
}

.playBtn{flex:1.1;background:linear-gradient(135deg,#4caf93,#66bb6a)}
.stopBtn{flex:1.1;background:linear-gradient(135deg,#7b7be8,#5c6bc0)}
.voiceBtn{flex:1.6;background:linear-gradient(135deg,#ff5a5a,#d84343);position:relative}

.voiceBtn select{
position:absolute;
inset:0;
width:100%;
height:100%;
opacity:0;
cursor:pointer;
}

.phrasePanel{
margin-top:14px;
display:flex;
gap:8px;
}

.phrasePanel input{
flex:1;
height:42px;
border-radius:10px;
border:1px solid #ddd;
padding:0 10px;
font-size:14px;
}

.phrasePanel button{
height:42px;
border:none;
border-radius:10px;
padding:0 12px;
background:#4caf50;
color:#fff;
font-weight:600;
}
</style>
</head>

<body>

<header>
<h1>📘 Reading Lab</h1>
<div class="lab">LAB VERSION</div>
</header>

<div class="main">
<textarea id="inputText" placeholder="Paste English text..."></textarea>

<div class="btnRow">
<button class="btn btnClear" onclick="clearText()">🧹 Clear</button>
<button class="btn btnRead" onclick="openReader()">📖 Read</button>
<button class="btn btnImport" onclick="importCSV()">📥 CSV</button>
<button class="btn btnPhoto" onclick="importPhoto()">📷 Photo</button>
</div>
</div>

<div class="modal" id="readerModal">
<div class="box">

<div class="readerToolbar">
<button class="toolBtn playBtn" onclick="playAll()">🔊 Play</button>
<button class="toolBtn stopBtn" onclick="stopSpeak()">⏹ Stop</button>

<div class="toolBtn voiceBtn">
<span>🎙️ Voice</span>
<select id="voiceSelect"></select>
</div>
</div>

<div class="closeX" onclick="closeReader()">✕</div>

<div id="reader"></div>

<div class="phrasePanel">
<input id="phraseText" placeholder="phrase">
<input id="phraseMeaning" placeholder="meaning">
<button onclick="savePhrase()">Save</button>
</div>

</div>
</div>

<script>
let sentences=[]
let synth=window.speechSynthesis
let voices=[]

/* ===== VOICE FIX ===== */
function loadVoices(){
voices=synth.getVoices()
const sel=document.getElementById("voiceSelect")
if(!voices.length){
setTimeout(loadVoices,200)
return
}
sel.innerHTML=""
voices.forEach((v,i)=>{
const o=document.createElement("option")
o.value=i
o.textContent=v.name
sel.appendChild(o)
})
}
speechSynthesis.onvoiceschanged=loadVoices
loadVoices()

/* ===== PHRASE DB ===== */
let PHRASES=JSON.parse(localStorage.getItem("phrases")||"[]")

function saveDB(){
localStorage.setItem("phrases",JSON.stringify(PHRASES))
}

function savePhrase(){
const t=document.getElementById("phraseText").value.trim()
const m=document.getElementById("phraseMeaning").value.trim()
if(!t||!m)return
PHRASES.push({text:t,meaning:m})
saveDB()
alert("Saved 1 phrase")
}

/* ===== CSV IMPORT ===== */
function importCSV(){
const inp=document.createElement("input")
inp.type="file"
inp.accept=".csv"
inp.onchange=e=>{
const file=e.target.files[0]
const reader=new FileReader()
reader.onload=ev=>{
const lines=ev.target.result.split("\n")
let count=0
lines.forEach(l=>{
const [p,m]=l.split(",")
if(p&&m){
PHRASES.push({text:p.trim(),meaning:m.trim()})
count++
}
})
saveDB()
alert("Imported "+count+" phrases")
}
reader.readAsText(file)
}
inp.click()
}

/* ===== PHOTO OCR ===== */
function importPhoto(){
alert("OCR active di versi kamu sebelumnya ✔")
}

/* ===== DETECT ===== */
function detectPhrases(text){
let out=text
PHRASES.forEach((p,i)=>{
const esc=p.text.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")
const re=new RegExp(`\\b${esc}\\b`,"gi")
out=out.replace(re,`<span class="phrase" data-i="${i}">$&</span>`)
})
return out
}

/* ===== READER ===== */
function openReader(){
const t=document.getElementById("inputText").value.trim()
if(!t)return
splitSentences(t)
renderSentences()
document.getElementById("readerModal").style.display="flex"
}

function closeReader(){
document.getElementById("readerModal").style.display="none"
stopSpeak()
}

function splitSentences(t){
sentences=t.replace(/\n/g," ").match(/[^\.!\?]+[\.!\?]+/g)||[t]
}

function renderSentences(){
const box=document.getElementById("reader")
box.innerHTML=""
sentences.forEach((s,i)=>{
const d=document.createElement("div")
d.className="sentence"
d.innerHTML=detectPhrases(s.trim())
d.onclick=()=>speakSentence(i)
box.appendChild(d)
})
}

document.getElementById("reader").addEventListener("click",e=>{
const ph=e.target.closest(".phrase")
if(!ph)return
e.stopPropagation()
const p=PHRASES[ph.dataset.i]
if(p)alert(p.text+" = "+p.meaning)
})

function speakSentence(i){
synth.cancel()
const u=new SpeechSynthesisUtterance(sentences[i])
const sel=document.getElementById("voiceSelect")
if(sel.value)u.voice=voices[sel.value]
synth.speak(u)
}

function playAll(){
let i=0
function next(){
if(i>=sentences.length)return
const u=new SpeechSynthesisUtterance(sentences[i])
const sel=document.getElementById("voiceSelect")
if(sel.value)u.voice=voices[sel.value]
u.onend=()=>{i++;next()}
synth.speak(u)
}
next()
}

function stopSpeak(){synth.cancel()}
function clearText(){document.getElementById("inputText").value=""}
</script>
</body>
</html>
