<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reading Lab</title>

<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f3f5f9}
header{background:#fff;padding:14px;box-shadow:0 2px 6px rgba(0,0,0,.08)}
h1{margin:0;font-size:22px}
.lab{font-size:12px;color:#888}

main{padding:14px}
textarea{
width:100%;
height:240px;
border:1px solid #ddd;
border-radius:12px;
padding:12px;
font-size:15px;
}

.translateBtn{
margin-top:12px;
width:100%;
background:#14b8a6;
color:#fff;
border:none;
border-radius:12px;
padding:12px;
font-size:16px;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.35);
display:none;
align-items:center;
justify-content:center;
}

.box{
background:#fff;
width:92%;
max-width:420px;
border-radius:16px;
padding:16px;
position:relative;
max-height:80vh;
overflow:auto;
}

.close{
position:absolute;
right:10px;
top:8px;
font-size:18px;
cursor:pointer;
color:#888;
}

#readerEN{
font-weight:600;
margin-bottom:10px;
white-space:pre-wrap;
}

#readerID{
color:#26a69a;
white-space:pre-wrap;
line-height:1.5;
}

.actions{
display:flex;
gap:8px;
margin-top:14px;
}

.actions button{
flex:1;
border:none;
border-radius:10px;
padding:10px;
}

.hear{background:#27ae60;color:#fff}
.cancel{background:#ccc}
</style>
</head>

<body>

<header>
<h1>📘 Reading Lab</h1>
<div class="lab">LAB VERSION</div>
</header>

<main>
<textarea id="readingInput" placeholder="Paste English text..."></textarea>
<button class="translateBtn" onclick="translateReading()">Translate</button>
</main>

<div id="modal" class="modal">
  <div class="box">
    <div class="close" onclick="closeReader()">✕</div>

    <div id="readerEN"></div>
    <div id="readerID"></div>

    <div class="actions">
      <button class="hear" onclick="hear()">Hear</button>
      <button class="cancel" onclick="closeReader()">Close</button>
    </div>
  </div>
</div>

<script>
async function translateReading(){
  const text=document.getElementById("readingInput").value.trim()
  if(!text)return

  document.getElementById("readerEN").innerText=text
  document.getElementById("readerID").innerText="Translating..."

  document.getElementById("modal").style.display="flex"

  try{
    const url="https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=id&dt=t&q="+encodeURIComponent(text)
    const res=await fetch(url)
    const data=await res.json()

    let hasil=""
    data[0].forEach(p=>hasil+=p[0])

    document.getElementById("readerID").innerText=hasil
  }catch(e){
    document.getElementById("readerID").innerText="Translation error"
  }
}

function closeReader(){
  document.getElementById("modal").style.display="none"
}

function hear(){
  const t=document.getElementById("readingInput").value
  if(!t)return
  const u=new SpeechSynthesisUtterance(t)
  u.lang="en-US"
  speechSynthesis.speak(u)
}
</script>

</body>
</html>
