<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Reading Lab DocChan</title>

<style>
*{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
body{margin:0;background:#f3f5f9}

header{
position:sticky;
top:0;
background:#fff;
padding:14px;
box-shadow:0 2px 6px rgba(0,0,0,.08);
z-index:10
}

h1{margin:0;font-size:22px}
.lab{font-size:12px;color:#888;margin-top:2px}

main{padding:14px}

textarea{
width:100%;
height:220px;
border-radius:12px;
border:1px solid #ddd;
padding:12px;
font-size:15px;
resize:vertical;
background:#fff
}

.translateBtn{
margin-top:12px;
width:100%;
border:none;
border-radius:12px;
padding:12px;
font-size:16px;
background:#14b8a6;
color:#fff
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.35);
display:none;
align-items:center;
justify-content:center;
z-index:50
}

.modal-box{
background:#fff;
width:92%;
max-width:420px;
border-radius:16px;
padding:16px;
position:relative
}

.modal-close{
position:absolute;
top:8px;
right:10px;
font-size:18px;
cursor:pointer;
color:#888
}

#readerMeaning{
font-size:15px;
line-height:1.5;
white-space:pre-wrap
}

.modal-actions{
display:flex;
gap:8px;
margin-top:14px
}

.audio{
flex:1;
background:#27ae60;
color:#fff;
border:none;
border-radius:10px;
padding:10px
}

.cancel{
flex:1;
background:#ccc;
border:none;
border-radius:10px;
padding:10px
}
</style>
</head>

<body>

<header>
<h1>📘 Reading Lab</h1>
<div class="lab">LAB VERSION</div>
</header>

<main>
<textarea id="readingInput" placeholder="Paste or type English text here..."></textarea>
<button class="translateBtn" onclick="openReader()">Translate</button>
</main>

<div id="readerModal" class="modal">
  <div class="modal-box">

    <div class="modal-close" onclick="closeReader()">✕</div>

    <div id="readerMeaning"></div>

    <div class="modal-actions">
      <button class="audio" onclick="hearReader()">Hear</button>
      <button class="cancel" onclick="closeReader()">Close</button>
    </div>

  </div>
</div>

<script>
function openReader(){
  const text = document.getElementById("readingInput").value.trim()
  if(!text) return

  // PAKAI TRANSLATOR LAMA KAMU
  const result = translateText(text)

  document.getElementById("readerMeaning").innerText = result || "(translation empty)"

  document.getElementById("readerModal").style.display="flex"
}

function closeReader(){
  document.getElementById("readerModal").style.display="none"
}

function hearReader(){
  const text = document.getElementById("readingInput").value
  if(!text) return
  const u = new SpeechSynthesisUtterance(text)
  u.lang="en-US"
  speechSynthesis.speak(u)
}
</script>

</body>
</html>
