<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reading Lab</title>

<style>
*{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
body{margin:0;background:#f3f5f9;color:#222}

header{
position:sticky;top:0;
background:#fff;
padding:16px 14px 10px;
box-shadow:0 2px 6px rgba(0,0,0,.08);
z-index:10
}

h1{margin:0;font-size:22px}
.lab{font-size:12px;color:#888;margin-top:2px}

.main{padding:14px}

textarea{
width:100%;
min-height:200px;
border-radius:14px;
border:1px solid #ddd;
padding:14px;
font-size:16px;
line-height:1.5;
resize:vertical;
background:#fff
}

.btnRow{
display:flex;
gap:12px;
margin-top:12px;
}

.btn{
flex:1;
height:54px;
border:none;
border-radius:14px;
font-size:17px;
color:#fff;
display:flex;
align-items:center;
justify-content:center;
gap:8px;
}

.btnRead{background:#26a69a}
.btnClear{background:linear-gradient(135deg,#7b61ff,#5a8dee)}
.btnImport{background:#2f86d6}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.35);
display:none;
align-items:center;
justify-content:center;
padding:18px
}

.box{
background:#fff;
width:calc(100vw - 28px);
max-width:560px;
border-radius:18px;
padding:20px 18px 18px;
position:relative;
max-height:88vh;
overflow:auto;
box-shadow:0 10px 30px rgba(0,0,0,.15)
}

.closeX{
position:absolute;
top:10px;
right:12px;
font-size:20px;
color:#999;
cursor:pointer
}

.readerToolbar{
display:flex;
gap:12px;
margin-bottom:14px;
}

.toolBtn{
height:56px;
border:none;
border-radius:18px;
font-size:18px;
font-weight:600;
color:#fff;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
padding:0 18px;
white-space:nowrap;
}

.playBtn{
flex:1.1;
background:linear-gradient(135deg,#4caf93,#66bb6a);
}

.stopBtn{
flex:1.1;
background:linear-gradient(135deg,#7b7be8,#5c6bc0);
}

.voiceBtn{
flex:1.6;
background:linear-gradient(135deg,#ff5a5a,#d84343);
position:relative;
}

.voiceBtn select{
position:absolute;
inset:0;
width:100%;
height:100%;
opacity:0;
cursor:pointer;
}

.sentence{
margin-bottom:12px;
line-height:1.6;
cursor:pointer;
padding:6px;
border-radius:8px;
}

.sentence.active{background:#e0f2f1}
.sentence.playing{background:#c8ede9}

.translation{
color:#26a69a;
margin-top:6px;
margin-bottom:10px;
display:none;
line-height:1.55
}

.phrase{
text-decoration:underline;
color:#e53935;
font-weight:600;
cursor:pointer;
}

#ocrLoad{
position:fixed;
inset:0;
background:rgba(0,0,0,.35);
display:none;
align-items:center;
justify-content:center;
z-index:50;
color:#fff;
font-size:18px;
flex-direction:column;
gap:10px
}

.spinner{
width:36px;
height:36px;
border:4px solid rgba(255,255,255,.3);
border-top:4px solid #fff;
border-radius:50%;
animation:spin 1s linear infinite
}

@keyframes spin{to{transform:rotate(360deg)}}

/* ===== PHRASE PANEL ===== */
#phrasePanel{
position:fixed;
bottom:14px;
right:14px;
background:#fff;
border-radius:12px;
padding:8px 10px;
box-shadow:0 2px 8px rgba(0,0,0,.15);
font-size:13px;
z-index:20;
display:flex;
align-items:center;
gap:6px;
}

#phrasePanel button{
border:none;
background:#ff5a5a;
color:#fff;
border-radius:8px;
padding:4px 6px;
font-size:12px;
cursor:pointer;
}

#phrasePanel label{
cursor:pointer;
}

.speaking{
  background:#d8ecff;
  border-radius:10px;
  padding:2px 4px;
}
</style>
</head>

<body>

<header>
<h1>📘 Reading Lab</h1>
<div class="lab">LAB VERSION</div>
</header>

<div class="main">
<textarea id="inputText" placeholder="Paste English text..."></textarea>

<div class="btnRow">
<button class="btn btnClear" onclick="clearText()">🧹 Clear</button>
<button class="btn btnRead" onclick="openReader()">📖 Read</button>
<button class="btn btnImport" onclick="document.getElementById('imgInput').click()">📥 Import</button>
</div>

<input type="file" id="imgInput" accept="image/*" style="display:none">
</div>

<div id="ocrLoad">
<div class="spinner"></div>
<div>Scanning text...</div>
</div>

<div class="modal" id="readerModal">
<div class="box">

<div class="readerToolbar">
<button class="toolBtn playBtn" onclick="playAll()">🔊 Play</button>
<button class="toolBtn stopBtn" onclick="stopSpeak()">⏹ Stop</button>

<div class="toolBtn voiceBtn">
<span>🎙️ Voice</span>
<select id="voiceSelect"></select>
</div>
</div>

<div class="closeX" onclick="closeReader()">✕</div>
<div id="reader"></div>

</div>
</div>

<!-- PHRASE PANEL -->
<div id="phrasePanel">
<span id="phraseCount">0 phrases</span>
<button onclick="deleteAllPhrases()">🗑</button>
<label>📥
<input type="file" accept=".csv" style="display:none" onchange="importPhraseCSV(this.files[0])">
</label>
</div>

<script>
let sentences=[]
let synth = window.speechSynthesis
let voices=[]
let speakingAll=false
let speakingLock=false   // ← TAMBAH INI

/* ===== PHRASE SYSTEM ===== */
let PHRASES = JSON.parse(localStorage.getItem("phrases")||"[]")

function savePhrases(){
localStorage.setItem("phrases",JSON.stringify(PHRASES))
updatePhraseCount()
}

function updatePhraseCount(){
document.getElementById("phraseCount").innerText=PHRASES.length+" phrases"
}

function addPhrase(text,meaning){
text=text.trim().toLowerCase()
if(!text)return
if(PHRASES.some(p=>p.text===text))return
PHRASES.push({text,meaning})
savePhrases()
}

function deleteAllPhrases(){
if(!confirm("Delete all phrases?"))return
PHRASES=[]
savePhrases()
}

function importPhraseCSV(file){
const reader=new FileReader()
reader.onload=e=>{
const lines=e.target.result.split(/\r?\n/)
lines.forEach(l=>{
const [t,m]=l.split(",")
if(t&&m)addPhrase(t,m)
})
}
reader.readAsText(file)
}

function detectPhrases(text){
let out=text
PHRASES.forEach((p,i)=>{
const esc=p.text.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")
const re=new RegExp(`\\b${esc}\\b`,"gi")
out=out.replace(re,`<span class="phrase" data-i="${i}">$&</span>`)
})
return out
}

document.addEventListener("click", e=>{
  const ph = e.target.closest(".phrase")
  if(!ph) return

  e.stopImmediatePropagation() // ⭐ ini kunci utama
  e.stopPropagation()
  e.preventDefault()

  const p = PHRASES[ph.dataset.i]
  if(p) alert(p.text + " = " + p.meaning)
})

updatePhraseCount()

/* ===== VOICE ===== */
function loadVoices(){
voices=synth.getVoices()
const sel=document.getElementById("voiceSelect")
if(!voices.length){setTimeout(loadVoices,200);return}
sel.innerHTML='<option value="">Default Voice</option>'
voices.forEach((v,i)=>{
const o=document.createElement("option")
o.value=i
o.textContent=v.name+" ("+v.lang+")"
sel.appendChild(o)
})
}
speechSynthesis.onvoiceschanged=loadVoices
loadVoices()

function getVoice(){
const sel=document.getElementById("voiceSelect")
if(!sel||sel.value==="")return null
return voices[sel.value]
}

/* ===== OCR ===== */
document.getElementById("imgInput").addEventListener("change",async e=>{
const file=e.target.files[0]
if(!file)return
document.getElementById("ocrLoad").style.display="flex"
const {data:{text}}=await Tesseract.recognize(file,"eng")
document.getElementById("ocrLoad").style.display="none"
document.getElementById("inputText").value=text.trim()
})

/* ===== READER ===== */
function openReader(){
const text=document.getElementById("inputText").value.trim()
if(!text)return
splitSentences(text)
renderSentences()
document.getElementById("readerModal").style.display="flex"
}

function closeReader(){
document.getElementById("readerModal").style.display="none"
stopSpeak()
}

function splitSentences(text){
sentences=text.replace(/\n/g," ").match(/[^\.!\?]+[\.!\?]+/g)||[text]
}

function renderSentences(){
const box=document.getElementById("reader")
box.innerHTML=""
sentences.forEach((s,i)=>{
const div=document.createElement("div")
div.className="sentence"
div.innerHTML=detectPhrases(s.trim())
div.onclick=()=>{
selectSentence(i)
speakSentence(i)
}
const tr=document.createElement("div")
tr.className="translation"
tr.id="tr"+i
div.appendChild(tr)
box.appendChild(div)
})
}

function selectSentence(i){
document.querySelectorAll(".sentence").forEach(s=>s.classList.remove("active"))
document.querySelectorAll(".translation").forEach(t=>t.style.display="none")
const sent=document.querySelectorAll(".sentence")[i]
const tr=document.getElementById("tr"+i)
sent.classList.add("active")
tr.style.display="block"
tr.innerText="Translating..."
fetch("https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=id&dt=t&q="+encodeURIComponent(sentences[i]))
.then(r=>r.json())
.then(d=>{
let hasil=""
d[0].forEach(b=>hasil+=b[0])
tr.innerText=hasil
})
}

/* ===== SPEECH ===== */
function speakSentence(i){
  synth.cancel()

  document.querySelectorAll(".sentence")
    .forEach(el=>el.classList.remove("speaking"))

  const el = document.querySelector(`.sentence[data-i="${i}"]`)
  if(el) el.classList.add("speaking")

  const u = new SpeechSynthesisUtterance(sentences[i])
  u.lang="en-US"

  const v = getVoice()
  if(v) u.voice=v

  u.onend=()=>{
    if(el) el.classList.remove("speaking")
  }

  synth.speak(u)
}

function playAll(){
if(!sentences.length)return
let i=0
function next(){
if(i>=sentences.length)return
const u=new SpeechSynthesisUtterance(sentences[i])
u.lang="en-US"
const v=getVoice()
if(v)u.voice=v
u.onend=()=>{i++;next()}
synth.speak(u)
}
next()
}

function stopSpeak(){synth.cancel()}

function clearText(){
document.getElementById("inputText").value=""
}
</script>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</body>
</html>
