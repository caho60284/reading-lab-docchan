<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Reading Lab</title>

<style>
*{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
body{margin:0;background:#f3f5f9;color:#222}

header{
position:sticky;top:0;
background:#fff;
padding:16px 14px 10px 14px;
box-shadow:0 2px 6px rgba(0,0,0,.08);
z-index:10
}

h1{margin:0;font-size:22px}
.lab{font-size:12px;color:#888;margin-top:2px}

.main{padding:14px}

textarea{
width:100%;
min-height:220px;
border-radius:14px;
border:1px solid #ddd;
padding:14px;
font-size:16px;
line-height:1.5;
resize:vertical;
background:#fff
}

.translateBtn{
margin-top:14px;
width:100%;
border:none;
border-radius:14px;
padding:14px;
font-size:17px;
background:#26a69a;
color:#fff
}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.35);
display:none;
align-items:center;
justify-content:center;
padding:18px
}

.box{
background:#fff;
width:100%;
max-width:520px;
border-radius:18px;
padding:20px 18px 18px 18px;
position:relative;
max-height:85vh;
overflow:auto;
box-shadow:0 10px 30px rgba(0,0,0,.15)
}

.closeX{
position:absolute;
top:10px;
right:12px;
font-size:20px;
color:#999;
cursor:pointer
}

#readerEN{
font-weight:600;
margin-bottom:14px;
line-height:1.55;
white-space:pre-wrap
}

#readerID{
color:#26a69a;
line-height:1.6;
margin-top:6px;
white-space:pre-wrap
}

.modal-actions{
display:flex;
gap:10px;
margin-top:16px
}

.modal-actions button{
flex:1;
border:none;
border-radius:10px;
padding:12px;
font-size:15px
}

.hear{background:#43a047;color:#fff}
.close{background:#e0e0e0;color:#555}
</style>
</head>

<body>

<header>
<h1>📘 Reading Lab</h1>
<div class="lab">LAB VERSION</div>
</header>

<div class="main">
<textarea id="inputText" placeholder="Paste or type English text here..."></textarea>

<button class="translateBtn" onclick="openReader()">Translate</button>
</div>

<!-- MODAL -->
<div class="modal" id="readerModal">
<div class="box">

<div class="closeX" onclick="closeReader()">✕</div>

<div id="readerEN"></div>
<div id="readerID"></div>

<div class="modal-actions">
<button class="hear" onclick="hear()">Hear</button>
<button class="close" onclick="closeReader()">Close</button>
</div>

</div>
</div>

<script>
function openReader(){
const text=document.getElementById("inputText").value.trim()
if(!text)return

document.getElementById("readerEN").innerText=text
document.getElementById("readerID").innerText="Translating..."

document.getElementById("readerModal").style.display="flex"

translate(text)
}

function closeReader(){
document.getElementById("readerModal").style.display="none"
}

function hear(){
const text=document.getElementById("readerEN").innerText
if(!text)return
speechSynthesis.cancel()
speechSynthesis.speak(new SpeechSynthesisUtterance(text))
}

/* GOOGLE TRANSLATE */
function translate(text){
fetch("https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=id&dt=t&q="+encodeURIComponent(text))
.then(r=>r.json())
.then(data=>{
let hasil=""
data[0].forEach(b=>hasil+=b[0])
document.getElementById("readerID").innerText=hasil
})
.catch(()=>{
document.getElementById("readerID").innerText="Translation failed"
})
}
</script>

</body>
</html>
