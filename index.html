<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Reading Lab</title>

<style>
body{
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
margin:0;
background:#f2f2f7;
}

header{
padding:18px;
font-weight:700;
font-size:22px;
background:#fff;
box-shadow:0 2px 6px rgba(0,0,0,.08);
}

.main{
padding:18px;
}

textarea{
width:100%;
height:160px;
border-radius:14px;
border:1px solid #ddd;
padding:12px;
font-size:16px;
resize:none;
}

.btnRow{
display:flex;
gap:10px;
margin-top:14px;
}

.btn{
flex:1;
padding:14px;
border:none;
border-radius:14px;
color:#fff;
font-weight:600;
font-size:16px;
}

.btnClear{background:linear-gradient(135deg,#7b6dff,#5a8bff)}
.btnRead{background:linear-gradient(135deg,#29b6a6,#4caf50)}
.btnImport{background:linear-gradient(135deg,#4a90e2,#357ae8)}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.3);
display:none;
align-items:center;
justify-content:center;
}

.box{
background:#fff;
border-radius:18px;
padding:18px;
width:92%;
max-width:520px;
}

.readerToolbar{
display:flex;
gap:10px;
margin-bottom:14px;
}

.toolBtn{
flex:1;
padding:14px;
border-radius:14px;
border:none;
color:#fff;
font-weight:600;
font-size:16px;
display:flex;
align-items:center;
justify-content:center;
gap:8px;
}

.playBtn{background:linear-gradient(135deg,#29b6a6,#4caf50)}
.stopBtn{background:linear-gradient(135deg,#7b6dff,#5a8bff)}

.voiceBtn{
flex:1;
position:relative;
background:linear-gradient(135deg,#ff4b4b,#d32f2f);
border-radius:14px;
display:flex;
align-items:center;
justify-content:center;
color:#fff;
font-weight:600;
overflow:hidden;
}

.voiceBtn span{
pointer-events:none;
}

.voiceBtn select{
position:absolute;
inset:0;
width:100%;
height:100%;
opacity:0;
cursor:pointer;
}

.sentence{
margin:10px 0;
padding:10px 12px;
border-radius:12px;
}

.active{
background:#cfe9e6;
}

.translation{
color:#3c9c94;
margin-top:6px;
}

.phrase{
text-decoration:underline;
text-decoration-color:#ff6b6b;
text-decoration-thickness:2px;
cursor:pointer;
}
</style>
</head>

<body>

<header>📘 Reading Lab</header>

<div class="main">
<textarea id="inputText" placeholder="Paste English text..."></textarea>

<div class="btnRow">
<button class="btn btnClear" onclick="clearText()">🧹 Clear</button>
<button class="btn btnRead" onclick="openReader()">📖 Read</button>
<button class="btn btnImport" onclick="document.getElementById('imgInput').click()">📥 Import</button>
</div>

<input type="file" id="imgInput" accept="image/*" style="display:none">
</div>

<div class="modal" id="readerModal">
<div class="box">

<div class="readerToolbar">
<button class="toolBtn playBtn" onclick="playAll()">🔊 Play All</button>
<button class="toolBtn stopBtn" onclick="stopSpeak()">⏹ Stop</button>

<div class="voiceBtn">
<span>🎙 Voice</span>
<select id="voiceSelect"></select>
</div>
</div>

<div id="readerContent"></div>

</div>
</div>

<script>
/* ===== PHRASES ===== */
const PHRASES={
"turn out":"ternyata",
"deal with":"menangani",
"give up":"menyerah",
"carry on":"melanjutkan",
"figure out":"memahami",
"come up":"mengusulkan",
"work out":"berhasil",
"find out":"menemukan",
"look after":"merawat",
"take care of":"mengurus"
}

/* ===== DETECT PHRASES MULTI ===== */
function detectPhrases(text){
let result=text
Object.keys(PHRASES).forEach(p=>{
const re=new RegExp("\\b"+p+"\\b","gi")
result=result.replace(re,
`<span class="phrase" data-p="${p}">${p}</span>`)
})
return result
}

/* ===== TRANSLATE MOCK ===== */
function translateSentence(s){
return s
.replace(/turn out/gi,"ternyata")
.replace(/deal with/gi,"menangani")
.replace(/give up/gi,"menyerah")
.replace(/carry on/gi,"melanjutkan")
.replace(/figure out/gi,"memahami")
.replace(/come up/gi,"mengusulkan")
.replace(/work out/gi,"berhasil")
.replace(/find out/gi,"menemukan")
.replace(/look after/gi,"merawat")
.replace(/take care of/gi,"mengurus")
}

/* ===== RENDER ===== */
function renderSentences(text){
const container=document.getElementById("readerContent")
container.innerHTML=""

const sentences=text.match(/[^\.!\?]+[\.!\?]+/g)||[]

sentences.forEach((s,i)=>{
const div=document.createElement("div")
div.className="sentence"
div.dataset.i=i

const en=document.createElement("div")
en.innerHTML=detectPhrases(s.trim())

const tr=document.createElement("div")
tr.className="translation"
tr.textContent=translateSentence(s.trim())

div.appendChild(en)
div.appendChild(tr)

container.appendChild(div)
})
}

/* ===== READER ===== */
function openReader(){
const txt=document.getElementById("inputText").value
if(!txt.trim())return
renderSentences(txt)
document.getElementById("readerModal").style.display="flex"
}

/* ===== SPEECH ===== */
let synth=window.speechSynthesis
let voices=[]

function loadVoices(){
voices=synth.getVoices()
const sel=document.getElementById("voiceSelect")
sel.innerHTML=""
voices.forEach((v,i)=>{
const o=document.createElement("option")
o.value=i
o.textContent=v.name+" ("+v.lang+")"
sel.appendChild(o)
})
}

speechSynthesis.onvoiceschanged=loadVoices
loadVoices()

function speak(text){
const u=new SpeechSynthesisUtterance(text)
const sel=document.getElementById("voiceSelect")
if(sel.value)u.voice=voices[sel.value]
synth.speak(u)
}

function playAll(){
const s=document.querySelectorAll(".sentence")
let i=0
function next(){
if(i>=s.length)return
document.querySelectorAll(".sentence").forEach(e=>e.classList.remove("active"))
s[i].classList.add("active")
speak(s[i].innerText)
i++
setTimeout(next,2500)
}
next()
}

function stopSpeak(){
synth.cancel()
document.querySelectorAll(".sentence").forEach(e=>e.classList.remove("active"))
}

/* ===== CLEAR ===== */
function clearText(){
document.getElementById("inputText").value=""
}

/* ===== CLICK PHRASE ===== */
document.addEventListener("click",e=>{
if(e.target.classList.contains("phrase")){
const p=e.target.dataset.p
alert(p+" = "+PHRASES[p])
}
})
</script>

</body>
</html>
