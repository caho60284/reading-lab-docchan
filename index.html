<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reading Lab</title>

<style>
*{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
body{margin:0;background:#f3f5f9;color:#222}

header{
position:sticky;top:0;
background:#fff;
padding:16px 14px 10px;
box-shadow:0 2px 6px rgba(0,0,0,.08);
z-index:10
}

h1{margin:0;font-size:22px}
.lab{font-size:12px;color:#888;margin-top:2px}

.main{padding:14px}

textarea{
width:100%;
min-height:220px;
border-radius:14px;
border:1px solid #ddd;
padding:14px;
font-size:16px;
line-height:1.5;
resize:vertical;
background:#fff
}

.translateBtn{
margin-top:14px;
width:100%;
border:none;
border-radius:14px;
padding:14px;
font-size:17px;
background:#26a69a;
color:#fff
}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.35);
display:none;
align-items:center;
justify-content:center;
padding:18px
}

.box{
background:#fff;
width:100%;
max-width:520px;
border-radius:18px;
padding:20px 18px 18px;
position:relative;
max-height:85vh;
overflow:auto;
box-shadow:0 10px 30px rgba(0,0,0,.15)
}

.closeX{
position:absolute;
top:10px;
right:12px;
font-size:20px;
color:#999;
cursor:pointer
}

#readerEN span{
display:block;
margin-bottom:10px;
cursor:pointer;
line-height:1.55
}

#readerEN span.active{
background:#e0f2f1;
border-radius:6px;
padding:4px 6px
}

#readerID{
color:#26a69a;
margin-top:10px;
line-height:1.6;
white-space:pre-wrap
}

.modal-actions{
display:flex;
gap:10px;
margin-top:16px
}

.modal-actions button{
flex:1;
border:none;
border-radius:10px;
padding:12px;
font-size:15px
}

.hear{background:#43a047;color:#fff}
.close{background:#e0e0e0;color:#555}
</style>
</head>

<body>

<header>
<h1>📘 Reading Lab</h1>
<div class="lab">LAB VERSION</div>
</header>

<div class="main">
<textarea id="inputText" placeholder="Paste English text..."></textarea>
<button class="translateBtn" onclick="openReader()">Read</button>
</div>

<div class="modal" id="readerModal">
<div class="box">

<div class="closeX" onclick="closeReader()">✕</div>

<div id="readerEN"></div>
<div id="readerID"></div>

<div class="modal-actions">
<button class="hear" onclick="hear()">Hear</button>
<button class="close" onclick="closeReader()">Close</button>
</div>

</div>
</div>

<script>
let sentences=[]

function openReader(){
const text=document.getElementById("inputText").value.trim()
if(!text)return

document.getElementById("readerID").innerText=""
document.getElementById("readerModal").style.display="flex"

splitSentences(text)
renderSentences()
}

function closeReader(){
document.getElementById("readerModal").style.display="none"
}

function splitSentences(text){
sentences = text
.replace(/\n/g," ")
.match(/[^\.!\?]+[\.!\?]+/g) || [text]
}

function renderSentences(){
const box=document.getElementById("readerEN")
box.innerHTML=""

sentences.forEach((s,i)=>{
const span=document.createElement("span")
span.innerText=s.trim()
span.onclick=()=>selectSentence(i)
box.appendChild(span)
})
}

function selectSentence(i){
const spans=document.querySelectorAll("#readerEN span")
spans.forEach(s=>s.classList.remove("active"))
spans[i].classList.add("active")

translate(sentences[i])
}

function translate(text){
document.getElementById("readerID").innerText="Translating..."

fetch("https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=id&dt=t&q="+encodeURIComponent(text))
.then(r=>r.json())
.then(data=>{
let hasil=""
data[0].forEach(b=>hasil+=b[0])
document.getElementById("readerID").innerText=hasil
})
}

function hear(){
const active=document.querySelector("#readerEN span.active")
if(!active)return
speechSynthesis.cancel()
speechSynthesis.speak(new SpeechSynthesisUtterance(active.innerText))
}
</script>

</body>
</html>
