<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reading Lab</title>

<style>
body{
  font-family:system-ui;
  margin:0;
  background:#f4f6f8;
}

header{
  padding:14px 18px;
  background:white;
  box-shadow:0 2px 6px rgba(0,0,0,.08);
}

.main{padding:16px}

textarea{
  width:100%;
  height:220px;
  border-radius:14px;
  border:1px solid #ddd;
  padding:14px;
  font-size:16px;
  resize:none;
}

.btnRow{
  display:flex;
  gap:12px;
  margin-top:12px;
}

.btn{
  flex:1;
  border:none;
  border-radius:14px;
  padding:14px;
  font-size:16px;
  color:white;
}

.btnClear{background:linear-gradient(135deg,#7b5cff,#5c6cff)}
.btnRead{background:linear-gradient(135deg,#2bb673,#1f8f58)}
.btnImport{background:linear-gradient(135deg,#4a90e2,#3b78c5)}
.btnStop{background:linear-gradient(135deg,#ff5f5f,#e53935)}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.35);
  display:none;
  align-items:center;
  justify-content:center;
}

.box{
  width:90%;
  max-width:520px;
  background:white;
  border-radius:16px;
  padding:16px;
}

.readerText{
  max-height:60vh;
  overflow:auto;
  line-height:1.6;
}

.sent{
  padding:6px;
  border-radius:8px;
  margin-bottom:6px;
}

.sent.active{
  background:#e8f2ff;
}

#voiceSelect{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
}

.popup{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:white;
  border-radius:12px;
  padding:12px 16px;
  box-shadow:0 4px 12px rgba(0,0,0,.2);
  display:none;
  max-width:90%;
}
</style>
</head>

<body>

<header>
  <h1>📘 Reading Lab</h1>
  <small>LAB VERSION</small>
</header>

<div class="main">
<textarea id="inputText" placeholder="Paste English text..."></textarea>

<div class="btnRow">
  <button class="btn btnClear" onclick="clearText()">🧹 Clear</button>
  <button class="btn btnRead" onclick="openReader()">📖 Read</button>
  <button class="btn btnImport" onclick="document.getElementById('imgInput').click()">📥 Import</button>
</div>

<input type="file" id="imgInput" accept="image/*" style="display:none">
</div>

<div id="ocrLoad" style="display:none;padding:10px;text-align:center;">
Scanning text...
</div>

<div class="modal" id="readerModal">
<div class="box">

<div style="display:flex;gap:10px;margin-bottom:10px">
  <button class="btn btnRead" onclick="playAll()">🔊 Play</button>
  <button class="btn btnStop" onclick="stopSpeak()">⏹ Stop</button>
  <select id="voiceSelect"></select>
</div>

<div id="readerText" class="readerText"></div>

</div>
</div>

<div id="popup" class="popup"></div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<script>
/* ===== BASIC ===== */
function clearText(){
  inputText.value=""
}

/* ===== READER SPLIT SENTENCE ===== */
function openReader(){
  const text=inputText.value.trim()
  if(!text) return

  readerText.innerHTML=""
  const sentences=text.match(/[^\.!\?]+[\.!\?]+/g) || [text]

  sentences.forEach(s=>{
    const div=document.createElement("div")
    div.className="sent"
    div.textContent=s.trim()
    div.onclick=()=>clickSentence(div)
    readerText.appendChild(div)
  })

  readerModal.style.display="flex"
}

/* ===== CLICK SENTENCE ===== */
function clickSentence(el){
  document.querySelectorAll(".sent").forEach(s=>s.classList.remove("active"))
  el.classList.add("active")

  speak(el.textContent)

  // pseudo arti demo
  popup.innerText="Arti: "+translate(el.textContent)
  popup.style.display="block"
}

/* ===== DEMO TRANSLATE ===== */
function translate(t){
  return t
}

/* ===== SPEECH ===== */
let synth=speechSynthesis
let voices=[]

function loadVoices(){
  voices=synth.getVoices()
  if(!voices.length){
    setTimeout(loadVoices,200)
    return
  }

  voiceSelect.innerHTML=""
  voices.forEach((v,i)=>{
    const opt=document.createElement("option")
    opt.value=i
    opt.textContent=v.name+" ("+v.lang+")"
    voiceSelect.appendChild(opt)
  })
}

speechSynthesis.onvoiceschanged=loadVoices
setTimeout(loadVoices,300)

function speak(text){
  stopSpeak()
  const u=new SpeechSynthesisUtterance(text)
  const v=voices[voiceSelect.value]
  if(v) u.voice=v
  synth.speak(u)
}

function playAll(){
  const all=[...document.querySelectorAll(".sent")]
  let i=0
  function next(){
    if(i>=all.length) return
    clickSentence(all[i])
    const u=new SpeechSynthesisUtterance(all[i].textContent)
    const v=voices[voiceSelect.value]
    if(v) u.voice=v
    u.onend=()=>{i++;next()}
    synth.speak(u)
  }
  next()
}

function stopSpeak(){
  synth.cancel()
}

/* ===== OCR ===== */
imgInput.addEventListener("change",async e=>{
  const f=e.target.files[0]
  if(!f) return

  ocrLoad.style.display="block"
  const {data:{text}}=await Tesseract.recognize(f,"eng")
  ocrLoad.style.display="none"

  if(text.trim()) inputText.value=text.trim()
})
</script>
</body>
</html>
