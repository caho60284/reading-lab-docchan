<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reading Lab</title>

<style>
/* ====== CSS KAMU ASLI TIDAK DIUBAH ====== */
body{margin:0;font-family:sans-serif;background:#f5f6fa}

.readerModal{
position:fixed;
inset:0;
background:rgba(0,0,0,.4);
display:flex;
align-items:center;
justify-content:center;
z-index:999;
}

.readerContent{
background:#fff;
width:92%;
max-width:520px;
border-radius:18px;
padding:18px;
box-sizing:border-box;
}

.readerToolbar{
display:flex;
gap:12px;
margin-bottom:14px;
}

.toolBtn{
border:none;
border-radius:12px;
padding:10px 14px;
font-weight:600;
cursor:pointer;
}

.playBtn{background:#4caf50;color:#fff}
.stopBtn{background:#e53935;color:#fff}
.voiceBtn{background:#9c27b0;color:#fff}

#reader{
line-height:1.7;
font-size:18px;
}

.sentence{margin-bottom:12px;cursor:pointer}

.translation{
font-size:15px;
color:#666;
margin-top:4px;
display:none;
}

.sentence.active{background:#eef3ff;border-radius:8px;padding:6px}

/* ====== PANEL FRASE (BARU) ====== */
.phrasePanel{
display:flex;
gap:6px;
margin-top:14px;
}

.phrasePanel input{
flex:1;
padding:8px;
border-radius:8px;
border:1px solid #ddd;
font-size:16px;
}

.phrasePanel button{
padding:8px 10px;
border:none;
border-radius:8px;
background:#4caf50;
color:#fff;
font-weight:600;
cursor:pointer;
}
</style>
</head>

<body>

<div class="readerModal">
<div class="readerContent">

<div class="readerToolbar">
<button class="toolBtn playBtn" onclick="playAll()">🔊 Play</button>
<button class="toolBtn stopBtn" onclick="stopSpeak()">⏹ Stop</button>

<div class="toolBtn voiceBtn">
<span>🎙 Voice</span>
<select id="voiceSelect"></select>
</div>
</div>

<div id="reader"></div>

<!-- ===== PANEL FRASE BARU ===== -->
<div class="phrasePanel">
<input id="phraseText" placeholder="phrase">
<input id="phraseMeaning" placeholder="meaning">
<button onclick="savePhrase()">Save</button>
</div>

</div>
</div>

<script>

/* ====== STATE ASLI ====== */
let sentences=[]
let currentIndex=-1
let voices=[]

/* ====== DATABASE FRASE ====== */
let PHRASES = JSON.parse(localStorage.getItem("phrases")||"[]")

function savePhrases(){
localStorage.setItem("phrases",JSON.stringify(PHRASES))
}

function savePhrase(){
const t=document.getElementById("phraseText").value.trim().toLowerCase()
const m=document.getElementById("phraseMeaning").value.trim()
if(!t||!m)return

PHRASES.push({text:t,meaning:m})
savePhrases()

document.getElementById("phraseText").value=""
document.getElementById("phraseMeaning").value=""
alert("Saved")
}

/* ====== DETECT FRASE ====== */
function detectPhrases(text){
let out=text
PHRASES.forEach((p,i)=>{
const esc=p.text.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")
const re=new RegExp(`\\b${esc}\\b`,"gi")
out=out.replace(re,
`<span class="phrase" data-i="${i}" style="text-decoration:underline;color:#e53935;font-weight:600;cursor:pointer">$&</span>`
)
})
return out
}

/* ====== RENDER ====== */
function renderSentences(){
const box=document.getElementById("reader")
box.innerHTML=""

sentences.forEach((s,i)=>{
const wrap=document.createElement("div")
wrap.className="sentence"
wrap.innerHTML=detectPhrases(s.trim())

wrap.addEventListener("click",(e)=>{
const ph=e.target.closest(".phrase")
if(ph){
e.stopPropagation()
const p=PHRASES[ph.dataset.i]
if(p)alert(p.text+" = "+p.meaning)
return
}
selectSentence(i)
speakSentence(i)
})

const trans=document.createElement("div")
trans.className="translation"
trans.id="tr"+i

wrap.appendChild(trans)
box.appendChild(wrap)
})
}

/* ====== READER ====== */
function loadText(text){
sentences=text.split(/[.!?]+/).filter(s=>s.trim())
renderSentences()
}

function selectSentence(i){
document.querySelectorAll(".sentence").forEach(s=>s.classList.remove("active"))
const el=document.querySelectorAll(".sentence")[i]
if(el)el.classList.add("active")
currentIndex=i
}

function speakSentence(i){
const t=sentences[i]
if(!t)return
const u=new SpeechSynthesisUtterance(t)
const v=voiceSelect.value
if(v&&voices[v])u.voice=voices[v]
speechSynthesis.speak(u)
}

function playAll(){
sentences.forEach((s)=>{
const u=new SpeechSynthesisUtterance(s)
speechSynthesis.speak(u)
})
}

function stopSpeak(){
speechSynthesis.cancel()
}

/* ====== VOICE ====== */
function loadVoices(){
voices=speechSynthesis.getVoices()
const sel=document.getElementById("voiceSelect")
sel.innerHTML=""
voices.forEach((v,i)=>{
const o=document.createElement("option")
o.value=i
o.textContent=v.name
sel.appendChild(o)
})
}

speechSynthesis.onvoiceschanged=loadVoices
loadVoices()

/* ===== DEMO TEXT ===== */
loadText("Take care of your health. We will deal with this problem later. It was a piece of cake.")

</script>
</body>
</html>
