<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reading Lab</title>

<style>
body{
  font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  margin:0;
  background:#f4f6f8;
}

header{
  padding:14px 18px;
  background:white;
  box-shadow:0 2px 6px rgba(0,0,0,.08);
}

header h1{
  margin:0;
  font-size:22px;
}

header small{
  color:#777;
}

.main{
  padding:16px;
}

textarea{
  width:100%;
  height:220px;
  border-radius:14px;
  border:1px solid #ddd;
  padding:14px;
  font-size:16px;
  resize:none;
}

.btnRow{
  display:flex;
  gap:12px;
  margin-top:12px;
}

.btn{
  flex:1;
  border:none;
  border-radius:14px;
  padding:14px;
  font-size:16px;
  color:white;
  cursor:pointer;
}

.btnClear{
  background:linear-gradient(135deg,#7b5cff,#5c6cff);
}

.btnRead{
  background:linear-gradient(135deg,#3aa89c,#2e8b80);
}

.btnImport{
  background:linear-gradient(135deg,#4a90e2,#3b78c5);
}

.btnStop{
  background:linear-gradient(135deg,#ff5f5f,#e53935);
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.35);
  display:none;
  align-items:center;
  justify-content:center;
}

.box{
  width:90%;
  max-width:520px;
  background:white;
  border-radius:16px;
  padding:16px;
}

.readerText{
  max-height:60vh;
  overflow:auto;
  margin-top:10px;
  line-height:1.6;
}

#voiceSelect{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
}
</style>
</head>

<body>

<header>
  <h1>📘 Reading Lab</h1>
  <small>LAB VERSION</small>
</header>

<div class="main">

<textarea id="inputText" placeholder="Paste English text..."></textarea>

<div class="btnRow">
  <button class="btn btnClear" onclick="clearText()">🧹 Clear</button>
  <button class="btn btnRead" onclick="openReader()">📖 Read</button>
  <button class="btn btnImport" onclick="document.getElementById('imgInput').click()">📥 Import</button>
</div>

<input type="file" id="imgInput" accept="image/*" style="display:none">

</div>

<div id="ocrLoad" style="display:none;padding:10px;text-align:center;">
Scanning text...
</div>

<div class="modal" id="readerModal">
<div class="box">

<div style="display:flex;gap:10px;margin-bottom:10px">
  <button class="btn btnRead" onclick="playAll()">🔊 Play All</button>
  <button class="btn btnStop" onclick="stopSpeak()">⏹ Stop</button>
  <select id="voiceSelect"></select>
</div>

<div id="readerText" class="readerText"></div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<script>
/* ===== TEXT ===== */
function clearText(){
  document.getElementById("inputText").value=""
}

function openReader(){
  const text=document.getElementById("inputText").value.trim()
  if(!text) return
  document.getElementById("readerText").innerText=text
  document.getElementById("readerModal").style.display="flex"
}

/* ===== SPEECH ENGINE ===== */
let synth=window.speechSynthesis
let voices=[]

function loadVoices(){
  const sel=document.getElementById("voiceSelect")
  if(!sel) return

  voices=synth.getVoices()

  // iOS belum load
  if(!voices.length){
    setTimeout(loadVoices,200)
    return
  }

  sel.innerHTML='<option value="">Default Voice</option>'

  // prioritaskan English
  const sorted=[
    ...voices.filter(v=>v.lang.startsWith("en")),
    ...voices.filter(v=>!v.lang.startsWith("en"))
  ]

  sorted.forEach((v,i)=>{
    const opt=document.createElement("option")
    opt.value=i
    opt.textContent=v.name+" ("+v.lang+")"
    sel.appendChild(opt)
  })

  // auto pilih female english jika ada
  const femaleIndex=sorted.findIndex(v=>/female|woman|siri/i.test(v.name) && v.lang.startsWith("en"))
  sel.value=femaleIndex>=0?femaleIndex:0
}

speechSynthesis.onvoiceschanged=loadVoices
setTimeout(loadVoices,300)

/* ===== PLAY ===== */
function playAll(){
  stopSpeak()

  const text=document.getElementById("readerText").innerText
  if(!text) return

  const sel=document.getElementById("voiceSelect")
  const utter=new SpeechSynthesisUtterance(text)

  const sorted=[
    ...voices.filter(v=>v.lang.startsWith("en")),
    ...voices.filter(v=>!v.lang.startsWith("en"))
  ]

  if(sel.value!==""){
    utter.voice=sorted[sel.value]
  }

  utter.rate=0.95
  utter.pitch=1
  synth.speak(utter)
}

function stopSpeak(){
  synth.cancel()
}

/* ===== OCR ===== */
document.getElementById("imgInput").addEventListener("change",async e=>{
  const file=e.target.files[0]
  if(!file) return

  document.getElementById("ocrLoad").style.display="block"

  const {data:{text}}=await Tesseract.recognize(file,"eng")

  document.getElementById("ocrLoad").style.display="none"

  if(text.trim()){
    document.getElementById("inputText").value=text.trim()
  }
})
</script>

</body>
</html>
