<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Reading Lab</title>

<style>
body{
  font-family:system-ui;
  margin:0;
  background:#f2f4f7;
}

/* HEADER */
.header{
  padding:16px;
  font-size:26px;
  font-weight:700;
}

/* TEXT AREA */
#textInput{
  width:92%;
  margin:12px auto;
  display:block;
  height:160px;
  border-radius:18px;
  border:1px solid #ddd;
  padding:14px;
  font-size:18px;
  box-sizing:border-box;
}

/* MAIN BUTTONS */
.mainBtns{
  display:flex;
  gap:12px;
  padding:12px;
}
.mainBtns button{
  flex:1;
  height:56px;
  border:none;
  border-radius:18px;
  font-size:18px;
  color:#fff;
}
.btnClear{background:#5c6bc0}
.btnRead{background:#43a047}
.btnCSV{background:#1e88e5}
.btnPhoto{background:#c48a3a}

/* PHRASE COUNT */
#phraseCount{
  position:absolute;
  right:14px;
  top:14px;
  font-size:13px;
  background:#000;
  color:#fff;
  padding:3px 8px;
  border-radius:12px;
  opacity:.7;
}

/* DELETE ALL PHRASE */
#deleteAllPhrase{
  margin:8px 12px;
  background:#d32f2f;
  color:#fff;
  border:none;
  border-radius:12px;
  padding:10px 12px;
}

/* READER POPUP */
.readerOverlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.25);
  display:none;
  align-items:center;
  justify-content:center;
}

.readerBox{
  width:92%;
  max-width:520px;
  background:#fff;
  border-radius:20px;
  padding:16px;
  box-sizing:border-box;
}

/* CLOSE X */
.closeX{
  position:absolute;
  right:12px;
  top:8px;
  font-size:22px;
  cursor:pointer;
}

/* TOOLBAR */
.readerToolbar{
  display:flex;
  gap:12px;
}
.toolBtn{
  flex:1;
  height:56px;
  border:none;
  border-radius:18px;
  font-size:18px;
  color:#fff;
}
.playBtn{background:#66bb6a}
.stopBtn{background:#e74c3c}
.voiceBtn{background:#8e44ad}

/* SENTENCE AREA */
#reader{
  margin-top:14px;
  font-size:20px;
  line-height:1.6;
}

/* PHRASE INPUT */
.phraseRow{
  display:flex;
  gap:8px;
  margin-top:12px;
}
.phraseRow input{
  flex:1;
  height:42px;
  border-radius:12px;
  border:1px solid #ccc;
  padding:8px;
  font-size:16px;
}
.savePhraseBtn{
  background:#43a047;
  color:#fff;
  border:none;
  border-radius:12px;
  padding:0 12px;
}

/* UNDERLINE PHRASE */
.phrase{
  color:#c0392b;
  text-decoration:underline;
  font-weight:600;
}
</style>
</head>

<body>

<div class="header">📘 Reading Lab</div>

<textarea id="textInput" placeholder="Paste text here..."></textarea>

<div class="mainBtns">
  <button class="btnClear" onclick="clearText()">Clear</button>
  <button class="btnRead" onclick="openReader()">Read</button>
  <button class="btnCSV" onclick="importCSV()">CSV</button>
  <button class="btnPhoto" onclick="openPhoto()">📷</button>
</div>

<button id="deleteAllPhrase" onclick="deleteAllPhrase()">🗑 Delete All Phrases</button>

<div id="phraseCount">0 phrases</div>

<!-- READER -->
<div class="readerOverlay" id="readerOverlay">
  <div class="readerBox">
    <div class="closeX" onclick="closeReader()">✕</div>

    <div class="readerToolbar">
      <button class="toolBtn playBtn" onclick="speak()">Play</button>
      <button class="toolBtn stopBtn" onclick="stopSpeak()">Stop</button>
      <button class="toolBtn voiceBtn">
        Voice
        <select id="voiceSelect"></select>
      </button>
    </div>

    <div id="reader"></div>

    <div class="phraseRow">
      <input id="phraseText" placeholder="phrase">
      <input id="phraseMeaning" placeholder="meaning">
      <button class="savePhraseBtn" onclick="savePhrase()">Save</button>
    </div>

  </div>
</div>

<input type="file" id="photoInput" accept="image/*" style="display:none">

<script>

/* ================= TEXT ================= */
function clearText(){
  textInput.value=""
}

function openReader(){
  const txt=textInput.value
  renderReader(txt)
  readerOverlay.style.display="flex"
}

function closeReader(){
  readerOverlay.style.display="none"
}

/* ================= PHRASES ================= */
let PHRASES=JSON.parse(localStorage.getItem("phrases")||"[]")

function updatePhraseCount(){
  phraseCount.innerText=PHRASES.length+" phrases"
}
updatePhraseCount()

function savePhrase(){
  const t=phraseText.value.trim().toLowerCase()
  const m=phraseMeaning.value.trim()
  if(!t||!m) return
  PHRASES.push({text:t,meaning:m})
  localStorage.setItem("phrases",JSON.stringify(PHRASES))
  phraseText.value=""
  phraseMeaning.value=""
  updatePhraseCount()
}

function deleteAllPhrase(){
  if(!confirm("Delete all phrases?")) return
  PHRASES=[]
  localStorage.setItem("phrases","[]")
  updatePhraseCount()
}

/* DETECT PHRASE */
function detectPhrase(txt){
  let out=txt
  PHRASES.forEach((p,i)=>{
    const re=new RegExp("\\b"+p.text+"\\b","gi")
    out=out.replace(re,
      `<span class="phrase" data-i="${i}">$&</span>`
    )
  })
  return out
}

function renderReader(txt){
  reader.innerHTML=detectPhrase(txt)
}

/* CLICK PHRASE */
reader.addEventListener("click",e=>{
  const el=e.target.closest(".phrase")
  if(!el) return
  const p=PHRASES[el.dataset.i]
  if(p) alert(p.text+" = "+p.meaning)
})

/* ================= SPEECH ================= */
let synth=window.speechSynthesis
let voices=[]

function loadVoices(){
  voices=synth.getVoices()
  voiceSelect.innerHTML=""
  voices.forEach((v,i)=>{
    const opt=document.createElement("option")
    opt.value=i
    opt.text=v.name
    voiceSelect.appendChild(opt)
  })
}
speechSynthesis.onvoiceschanged=loadVoices

function speak(){
  const txt=reader.innerText
  const u=new SpeechSynthesisUtterance(txt)
  const v=voices[voiceSelect.value]
  if(v) u.voice=v
  synth.speak(u)
}

function stopSpeak(){
  synth.cancel()
}

/* ================= CSV ================= */
function importCSV(){
  const input=document.createElement("input")
  input.type="file"
  input.accept=".csv"
  input.onchange=e=>{
    const file=e.target.files[0]
    const r=new FileReader()
    r.onload=ev=>{
      const rows=ev.target.result.split("\n")
      rows.forEach(row=>{
        const [t,m]=row.split(",")
        if(t&&m){
          PHRASES.push({text:t.trim().toLowerCase(),meaning:m.trim()})
        }
      })
      localStorage.setItem("phrases",JSON.stringify(PHRASES))
      updatePhraseCount()
      alert("Imported ✔")
    }
    r.readAsText(file)
  }
  input.click()
}

/* ================= PHOTO OCR ================= */
function openPhoto(){
  photoInput.click()
}

photoInput.addEventListener("change",e=>{
  const file=e.target.files[0]
  if(!file) return
  const readerFile=new FileReader()
  readerFile.onload=ev=>{
    textInput.value=""
    textInput.value="[Image loaded ✔]"
  }
  readerFile.readAsDataURL(file)
})

</script>
</body>
</html>
