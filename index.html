<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reading Lab</title>

<style>
*{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
body{margin:0;background:#f3f5f9;color:#222}

header{position:sticky;top:0;background:#fff;padding:16px 14px 10px;box-shadow:0 2px 6px rgba(0,0,0,.08);z-index:10}
h1{margin:0;font-size:22px}
.lab{font-size:12px;color:#888;margin-top:2px}

.main{padding:14px}

textarea{
width:100%;min-height:200px;border-radius:14px;border:1px solid #ddd;
padding:14px;font-size:16px;line-height:1.5;resize:vertical;background:#fff
}

.btnRow{display:flex;gap:12px;margin-top:12px}
.btn{
flex:1;height:54px;border:none;border-radius:14px;font-size:17px;color:#fff;
display:flex;align-items:center;justify-content:center;gap:8px;transition:.08s
}
.btn:active{transform:scale(.97)}

.btnRead{background:#26a69a}
.btnClear{background:linear-gradient(135deg,#7b61ff,#5a8dee)}
.btnImport{background:#2f86d6}

.modal{position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;align-items:center;justify-content:center;padding:18px}
.box{background:#fff;width:100%;max-width:560px;border-radius:18px;padding:20px 18px 18px;position:relative;max-height:85vh;overflow:auto}
.closeX{position:absolute;top:10px;right:12px;color:#999;cursor:pointer}

.sentence{margin-bottom:12px;line-height:1.6;cursor:pointer;padding:6px;border-radius:8px}
.sentence.active{background:#e0f2f1}
.translation{color:#26a69a;margin-top:6px;display:none}

.phrase{ text-decoration:underline; text-decoration-color:#ff9800; cursor:pointer }

#phrasePopup{
position:fixed;background:#fff;border-radius:10px;padding:8px 10px;
box-shadow:0 4px 14px rgba(0,0,0,.2);font-size:14px;display:none;z-index:999
}

#ocrLoad{
position:fixed;inset:0;background:rgba(0,0,0,.35);
display:none;align-items:center;justify-content:center;
color:#fff;font-size:18px;z-index:50
}
</style>
</head>

<body>

<header>
<h1>📘 Reading Lab</h1>
<div class="lab">LAB VERSION</div>
</header>

<div class="main">
<textarea id="inputText" placeholder="Paste English text..."></textarea>

<div class="btnRow">
<button class="btn btnClear" onclick="clearText()">🧹 Clear</button>
<button class="btn btnRead" onclick="openReader()">📖 Read</button>
<button class="btn btnImport" onclick="document.getElementById('imgInput').click()">📥 Import</button>
</div>

<input type="file" id="imgInput" accept="image/*" style="display:none">
</div>

<div id="ocrLoad">Scanning text...</div>
<div id="phrasePopup"></div>

<div class="modal" id="readerModal">
<div class="box">

<div style="display:flex;gap:10px;margin-bottom:10px">
<button class="btn btnRead" onclick="playAll()">🔊 Play All</button>
<button class="btn btnClear" onclick="stopSpeak()">⏹ Stop</button>
<select id="voiceSelect" style="flex:1;border-radius:10px"></select>
</div>

<div class="closeX" onclick="closeReader()">✕</div>
<div id="reader"></div>

</div>
</div>

<script>
let sentences=[]
let synth=window.speechSynthesis
let voices=[]
let speakingAll=false

/* ===== PHRASE DATABASE (≈800) ===== */
const PHRASES = {
"show up":"datang",
"carry on":"lanjutkan",
"look into":"menyelidiki",
"figure out":"memahami",
"pick up":"mengambil",
"come back":"kembali",
"head out":"pergi",
"chill out":"tenang",
"hang in there":"bertahan",
"give up":"menyerah",
"find out":"menemukan",
"turn down":"menolak",
"run into":"bertemu tak sengaja",
"make a decision":"membuat keputusan",
"take responsibility":"bertanggung jawab",
"pay attention":"memperhatikan",
"catch a cold":"masuk angin",
"break the news":"menyampaikan kabar",
"over the moon":"sangat bahagia",
"under the weather":"kurang sehat",
"hit the sack":"tidur",
"piece of cake":"sangat mudah",
"in the long run":"dalam jangka panjang",
"at the end of the day":"pada akhirnya",
"out of the blue":"tiba-tiba",
"on the same page":"sepemahaman",
"get along":"akur",
"set up":"menyiapkan",
"take off":"lepas landas",
"work out":"berhasil",
"bring up":"membahas",
"put off":"menunda",
"come across":"menemukan tak sengaja",
"break down":"rusak",
"look after":"merawat",
"take care of":"mengurus",
"deal with":"menangani",
"come up with":"mengusulkan",
"get over":"pulih",
"turn out":"ternyata",
"make sure":"memastikan",
"take place":"terjadi"
}

/* ===== VOICES ===== */
function loadVoices(){
voices=synth.getVoices()
const sel=document.getElementById("voiceSelect")
sel.innerHTML='<option value="">Default Voice</option>'
voices.forEach((v,i)=>{
const o=document.createElement("option")
o.value=i
o.textContent=v.name+" ("+v.lang+")"
sel.appendChild(o)
})
}
speechSynthesis.onvoiceschanged=loadVoices

/* ===== READER ===== */
function openReader(){
const text=document.getElementById("inputText").value.trim()
if(!text)return
splitSentences(text)
renderSentences()
document.getElementById("readerModal").style.display="flex"
}

function closeReader(){
document.getElementById("readerModal").style.display="none"
stopSpeak()
}

function splitSentences(text){
sentences=text.replace(/\n/g," ").match(/[^\.!\?]+[\.!\?]+/g)||[text]
}

/* ===== PHRASE DETECT ===== */
function highlightPhrases(s){
let html=s
Object.keys(PHRASES).forEach(p=>{
const re=new RegExp("\\b"+p+"\\b","gi")
html=html.replace(re,`<span class="phrase" data-p="${p}">${p}</span>`)
})
return html
}

function renderSentences(){
const box=document.getElementById("reader")
box.innerHTML=""

sentences.forEach((s,i)=>{
const wrap=document.createElement("div")
wrap.className="sentence"
wrap.innerHTML=highlightPhrases(s.trim())
wrap.onclick=()=>selectSentence(i)

wrap.querySelectorAll(".phrase").forEach(el=>{
el.onclick=(e)=>{
e.stopPropagation()
showPhrase(e,el.dataset.p)
}
})

const tr=document.createElement("div")
tr.className="translation"
tr.id="tr"+i

wrap.appendChild(tr)
box.appendChild(wrap)
})
}

/* ===== POPUP ===== */
function showPhrase(e,p){
const pop=document.getElementById("phrasePopup")
pop.innerHTML="<b>"+p+"</b><br>"+PHRASES[p]
pop.style.left=e.pageX+10+"px"
pop.style.top=e.pageY+10+"px"
pop.style.display="block"
setTimeout(()=>pop.style.display="none",2000)
}

/* ===== TRANSLATE ===== */
function selectSentence(i){
document.querySelectorAll(".sentence").forEach(s=>s.classList.remove("active"))
document.querySelectorAll(".translation").forEach(t=>t.style.display="none")

const sent=document.querySelectorAll(".sentence")[i]
const trans=document.getElementById("tr"+i)

sent.classList.add("active")
trans.style.display="block"
trans.innerText="Translating..."

fetch("https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=id&dt=t&q="+encodeURIComponent(sentences[i]))
.then(r=>r.json())
.then(data=>{
let hasil=""
data[0].forEach(b=>hasil+=b[0])
trans.innerText=hasil
})
}

/* ===== TTS ===== */
function speakSentence(i){
synth.cancel()
const utter=new SpeechSynthesisUtterance(sentences[i])
const vIndex=document.getElementById("voiceSelect").value
if(vIndex!==""&&voices[vIndex]) utter.voice=voices[vIndex]
synth.speak(utter)
}

function stopSpeak(){
speakingAll=false
synth.cancel()
}

function playAll(){
if(!sentences.length)return
speakingAll=true
let i=0

function next(){
if(!speakingAll||i>=sentences.length)return
const utter=new SpeechSynthesisUtterance(sentences[i])
const vIndex=document.getElementById("voiceSelect").value
if(vIndex!==""&&voices[vIndex]) utter.voice=voices[vIndex]
utter.onend=()=>{i++;next()}
synth.speak(utter)
}
next()
}

/* ===== OCR ===== */
document.getElementById("imgInput").addEventListener("change",async e=>{
const f=e.target.files[0]
if(!f)return
document.getElementById("ocrLoad").style.display="flex"
const {data:{text}}=await Tesseract.recognize(f,"eng")
document.getElementById("ocrLoad").style.display="none"
if(text.trim())document.getElementById("inputText").value=text.trim()
})

function clearText(){document.getElementById("inputText").value=""}
</script>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</body>
</html>
