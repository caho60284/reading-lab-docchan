<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>EN → ID Translator</title>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:#f4f6f8;
  margin:0;
  padding:16px;
}
.container{max-width:720px;margin:auto}
.card{
  background:#fff;
  border-radius:16px;
  padding:14px;
  box-shadow:0 2px 10px rgba(0,0,0,.06);
  margin-bottom:12px;
}
textarea{
  width:100%;
  border:none;
  outline:none;
  resize:none;
  font-size:20px;
  line-height:1.5;
}
.output{
  font-size:20px;
  line-height:1.6;
  color:#118a78;
}
.toolbar{
  display:flex;
  justify-content:flex-end;
  gap:8px;
  margin-top:8px;
}
.icon-btn{
  border:none;
  background:#eef1f3;
  border-radius:10px;
  padding:6px 12px;
  font-size:15px;
  cursor:pointer;
}
.icon-btn:hover{background:#e0e4e7}
</style>
</head>

<body>
<div class="container">

<div class="card">
<textarea id="inputText" rows="4" placeholder="Enter English text..."></textarea>
<div class="toolbar">
<button class="icon-btn" onclick="pasteText()">📋 Paste</button>
<button class="icon-btn" onclick="clearText()">✕ Clear</button>
</div>
</div>

<div class="card">
<div id="outputText" class="output"></div>
</div>

</div>

<script>
const inputEl=document.getElementById("inputText");
const outputEl=document.getElementById("outputText");

inputEl.addEventListener("input",translate);

// ===== MAIN PIPELINE =====
function translate(){
  const text=inputEl.value.trim();
  if(!text){outputEl.innerText="";return;}

  let t=text;

  t=normalize(t);
  t=patternContrast(t);
  t=patternAsIf(t);
  t=lexicalMap(t);
  t=restructure(t);
  t=cleanup(t);
  t=capitalize(t);

  outputEl.innerText=t;
}

// ===== NORMALIZE =====
function normalize(t){
  return t.replace(/\s+/g," ").trim();
}

// ===== PATTERN: not in X, in Y =====
function patternContrast(t){
  return t.replace(
    /not in ([a-z\s]+),?\s*in ([a-z\s]+)/gi,
    "bukan karena $1, tapi untuk $2"
  );
}

// ===== PATTERN: as if clause =====
function patternAsIf(t){
  return t.replace(
    /as if ([a-z\s]+) could ([a-z\s]+)/gi,
    "seolah $1 bisa $2"
  );
}

// ===== LEXICAL MAP =====
function lexicalMap(t){

  const rules=[
    {en:/\bhe carried him\b/gi,id:"ia menggendongnya"},
    {en:/\bhe carried\b/gi,id:"ia menggendong"},
    {en:/\bdifferently now\b/gi,id:"dengan cara berbeda sekarang"},
    {en:/\bhe nodded\b/gi,id:"ia mengangguk"},
    {en:/\btoo quickly\b/gi,id:"terlalu cepat"},
    {en:/\bagreement\b/gi,id:"persetujuan"},
    {en:/\bloss\b/gi,id:"kehilangan"},
    {en:/\bpanic\b/gi,id:"panik"},
    {en:/\bprotection\b/gi,id:"melindunginya"},
    {en:/\bhim\b/gi,id:"nya"},
    {en:/\bhe\b/gi,id:"ia"}
  ];

  rules.forEach(r=>{t=t.replace(r.en,r.id);});
  return t;
}

// ===== RESTRUCTURE =====
function restructure(t){
  t=t.replace(/menggendong nya/gi,"menggendongnya");
  t=t.replace(/ia nya/gi,"ianya");
  t=t.replace(/nya nya/gi,"nya");
  return t;
}

// ===== CLEANUP =====
function cleanup(t){
  t=t.replace(/\s+—\s+/g," — ");
  t=t.replace(/\s+,/g,",");
  t=t.replace(/\s+\./g,".");
  return t.trim();
}

// ===== CAPITALIZE =====
function capitalize(t){
  return t.charAt(0).toUpperCase()+t.slice(1);
}

// ===== CLEAR =====
function clearText(){
  inputEl.value="";
  outputEl.innerText="";
  inputEl.focus();
}

// ===== PASTE =====
async function pasteText(){
  try{
    const txt=await navigator.clipboard.readText();
    inputEl.value=txt;
    translate();
    inputEl.focus();
  }catch{
    alert("Clipboard tidak diizinkan");
  }
}
</script>
</body>
</html>
