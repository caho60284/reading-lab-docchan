<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reading Lab</title>

<style>
*{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
body{margin:0;background:#f3f5f9;color:#222}

header{
position:sticky;top:0;
background:#fff;
padding:16px 14px 10px;
box-shadow:0 2px 6px rgba(0,0,0,.08);
z-index:10
}

h1{margin:0;font-size:22px}
.lab{font-size:12px;color:#888;margin-top:2px}

.main{padding:14px}

textarea{
width:100%;
min-height:200px;
border-radius:14px;
border:1px solid #ddd;
padding:14px;
font-size:16px;
line-height:1.5;
resize:vertical;
background:#fff
}

.btnRow{
display:flex;
gap:12px;
margin-top:12px;
}

.btn{
flex:1;
height:54px;
border:none;
border-radius:14px;
font-size:17px;
color:#fff;
display:flex;
align-items:center;
justify-content:center;
gap:8px;
transition:transform .08s, box-shadow .08s;
}

.btn:active{
transform:scale(.97);
box-shadow:0 2px 6px rgba(0,0,0,.15) inset;
}

.btnRead{background:#26a69a}
.btnClear{background:linear-gradient(135deg,#7b61ff,#5a8dee)}
.btnImport{background:#2f86d6}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.35);
display:none;
align-items:center;
justify-content:center;
padding:18px
}

.box{
background:#fff;
width:100%;
max-width:560px;
border-radius:18px;
padding:20px 18px 18px;
position:relative;
max-height:85vh;
overflow:auto;
box-shadow:0 10px 30px rgba(0,0,0,.15)
}

.closeX{
position:absolute;
top:10px;
right:12px;
font-size:20px;
color:#999;
cursor:pointer
}

.sentence{
margin-bottom:12px;
line-height:1.6;
cursor:pointer;
padding:6px 6px;
border-radius:8px;
transition:background .15s;
}

.sentence.active{background:#e0f2f1}
.sentence.playing{background:#c8ede9}

.translation{
color:#26a69a;
margin-top:6px;
margin-bottom:10px;
display:none;
line-height:1.55
}

#ocrLoad{
position:fixed;
inset:0;
background:rgba(0,0,0,.35);
display:none;
align-items:center;
justify-content:center;
z-index:50;
color:#fff;
font-size:18px;
flex-direction:column;
gap:10px
}

.spinner{
width:36px;
height:36px;
border:4px solid rgba(255,255,255,.3);
border-top:4px solid #fff;
border-radius:50%;
animation:spin 1s linear infinite
}

@keyframes spin{to{transform:rotate(360deg)}}

.voiceSelect{
flex:1;
height:54px;
border:none;
border-radius:14px;
padding:0 12px;
font-size:16px;
color:#fff;
background:linear-gradient(135deg,#ff4b4b,#d32f2f);
appearance:none;
display:flex;
align-items:center;
}

.voiceSelect option{
color:#000;
background:#fff;
}

.readerToolbar{
  display:flex;
  gap:12px;
  margin-bottom:14px;
}

.toolBtn{
  height:56px;
  border:none;
  border-radius:18px;
  font-size:18px;
  font-weight:600;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  padding:0 18px;
  white-space:nowrap;      /* emoji + teks 1 baris */
}

.playBtn{
  flex:1.1;
  background:linear-gradient(135deg,#4caf93,#66bb6a);
}

.stopBtn{
  flex:1.1;
  background:linear-gradient(135deg,#7b7be8,#5c6bc0);
}

.voiceBtn{
  flex:1.6;               /* sedikit lebih panjang */
  background:linear-gradient(135deg,#ff5a5a,#d84343);
  position:relative;
}

/* klik seluruh area merah */
.voiceBtn select{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  opacity:0;
  cursor:pointer;
}

</style>
</head>

<body>

<header>
<h1>📘 Reading Lab</h1>
<div class="lab">LAB VERSION</div>
</header>

<div class="main">
<textarea id="inputText" placeholder="Paste English text..."></textarea>

<div class="btnRow">
<button class="btn btnClear" onclick="clearText()">🧹 Clear</button>
<button class="btn btnRead" onclick="openReader()">📖 Read</button>
<button class="btn btnImport" onclick="document.getElementById('imgInput').click()">📥 Import</button>
</div>

<input type="file" id="imgInput" accept="image/*" style="display:none">
</div>

<div id="ocrLoad">
<div class="spinner"></div>
<div>Scanning text...</div>
</div>

<div class="modal" id="readerModal">
<div class="box">

<div class="readerToolbar">

<button class="toolBtn playBtn" onclick="playAll()">🔊 Play</button>
<button class="toolBtn stopBtn" onclick="stopSpeak()">⏹ Stop</button>

<div class="toolBtn voiceBtn">
<span>🎙️Voice</span>
<select id="voiceSelect"></select>
</div>

</div>

<div class="closeX" onclick="closeReader()">✕</div>
<div id="reader"></div>

</div>
</div>

function loadVoices(){
voices = synth.getVoices()
const sel=document.getElementById("voiceSelect")
if(!sel) return

if(!voices.length){
setTimeout(loadVoices,200)
return
}

sel.innerHTML='<option value="">Default Voice</option>'

voices.forEach((v,i)=>{
const o=document.createElement("option")
o.value=i
o.textContent=v.name+" ("+v.lang+")"
sel.appendChild(o)
})
}

speechSynthesis.onvoiceschanged=loadVoices
loadVoices()

function getSelectedVoice(){
const sel=document.getElementById("voiceSelect")
if(!sel||sel.value==="") return null
return voices[sel.value]
}

function openReader(){
const text=document.getElementById("inputText").value.trim()
if(!text)return
splitSentences(text)
renderSentences()
document.getElementById("readerModal").style.display="flex"
}

function closeReader(){
document.getElementById("readerModal").style.display="none"
stopSpeak()
}

function splitSentences(text){
sentences = text
.replace(/\n/g," ")
.match(/[^\.!\?]+[\.!\?]+/g) || [text]
}

function readText(){
  const input = document.getElementById("inputText")
  if(!input) return

  const text = input.value.trim()
  if(!text) return

  splitSentences(text)
  renderSentences()
}

function renderSentences(){
const box=document.getElementById("reader")
box.innerHTML=""

sentences.forEach((s,i)=>{
const wrap=document.createElement("div")
wrap.className="sentence"
wrap.innerHTML = highlightPhrases(s.trim())

wrap.querySelectorAll(".phrase").forEach(el=>{
  el.onclick = (e)=>{
    e.stopPropagation()
    const p = el.dataset.p
    showPhrase(p)
  }
})

wrap.addEventListener("click",(e)=>{
  if(e.target.classList.contains("phrase")){
    e.stopPropagation()
    showPhrase(e.target.dataset.p)
    return
  }

  selectSentence(i)
  speakSentence(i)
})

const trans=document.createElement("div")
trans.className="translation"
trans.id="tr"+i

wrap.appendChild(trans)
box.appendChild(wrap)
})
}

function selectSentence(i){
document.querySelectorAll(".sentence").forEach(s=>s.classList.remove("active"))
document.querySelectorAll(".translation").forEach(t=>t.style.display="none")

const sent=document.querySelectorAll(".sentence")[i]
const trans=document.getElementById("tr"+i)

sent.classList.add("active")
trans.style.display="block"
trans.innerText="Translating..."

fetch("https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=id&dt=t&q="+encodeURIComponent(sentences[i]))
.then(r=>r.json())
.then(data=>{
let hasil=""
data[0].forEach(b=>hasil+=b[0])
trans.innerText=hasil
})
}

function translatePhrase(base){
  const dict = {
    "take care":"merawat / menjaga",
    "deal with":"menghadapi",
    "turn out":"ternyata",
    "give up":"menyerah",
    "carry on":"terus melanjutkan",
    "find out":"mengetahui",
    "work out":"berhasil / terpecahkan",
    "look after":"merawat",
    "come up with":"memikirkan / menemukan ide",
    "make up":"mengarang / membuat"
  }
  return dict[base] || ""
}

function showPhrase(i){
  const phrase = PHRASES[i]
  if(!phrase) return
  const arti = PHRASE_MEANING[phrase] || ""
  alert(phrase + (arti ? " = " + arti : ""))
}

function clearText(){
const el=document.getElementById("inputText")
el.value=""
el.focus()
}

function speakSentence(i){
synth.cancel()
currentIndex=i
highlightPlaying(i)

const utter=new SpeechSynthesisUtterance(sentences[i])
utter.lang="en-US"
utter.rate=0.9

const v=getSelectedVoice()
if(v) utter.voice=v

utter.onend=()=>removePlaying()

synth.speak(utter)
}

function highlightPlaying(i){
removePlaying()
document.querySelectorAll(".sentence")[i].classList.add("playing")
}

function removePlaying(){
document.querySelectorAll(".sentence").forEach(s=>s.classList.remove("playing"))
}

function stopSpeak(){
speakingAll=false
synth.cancel()
removePlaying()
}

function playAll(){
if(!sentences.length)return
speakingAll=true
synth.cancel()
let i=0

function next(){
if(!speakingAll||i>=sentences.length){removePlaying();return}

highlightPlaying(i)

const utter=new SpeechSynthesisUtterance(sentences[i])
utter.lang="en-US"
utter.rate=0.9

const v=getSelectedVoice()
if(v) utter.voice=v

utter.onend=()=>{
i++
next()
}

synth.speak(utter)
}

next()
}

document.getElementById("imgInput").addEventListener("change", handleImage)

async function handleImage(e){
const file=e.target.files[0]
if(!file)return

showOCR(true)

const { data:{ text } } = await Tesseract.recognize(file,"eng")

showOCR(false)

if(!text.trim())return
document.getElementById("inputText").value=text.trim()
}

function showOCR(v){
document.getElementById("ocrLoad").style.display=v?"flex":"none"
}

function highlightPhrases(text){
  let out = text

  PHRASES.forEach((ph,i)=>{
    const escaped = ph.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")
    const regex = new RegExp(`\\b${escaped}\\b`,"gi")

    out = out.replace(regex,
      `<span class="phrase" data-p="${i}" style="text-decoration:underline;color:#e53935;font-weight:600;cursor:pointer">$&</span>`
    )
  })

  return out
}
