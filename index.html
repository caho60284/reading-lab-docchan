<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reading Lab</title>

<style>
*{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
body{margin:0;background:#f3f5f9;color:#222}

header{
position:sticky;top:0;
background:#fff;
padding:16px 14px 10px;
box-shadow:0 2px 6px rgba(0,0,0,.08);
z-index:10
}

h1{margin:0;font-size:22px}
.lab{font-size:12px;color:#888;margin-top:2px}

.main{padding:14px}

textarea{
width:100%;
min-height:200px;
border-radius:14px;
border:1px solid #ddd;
padding:14px;
font-size:16px;
line-height:1.5;
resize:vertical;
background:#fff
}

.readBtn{
margin-top:12px;
width:100%;
border:none;
border-radius:14px;
padding:14px;
font-size:17px;
background:#26a69a;
color:#fff
}

.btnRow{
display:flex;
gap:12px;
margin-top:12px;
}

.btn{
flex:1;
border:none;
border-radius:14px;
padding:14px;
font-size:17px;
}

.readBtn{
background:#26a69a;
color:#fff;
}

.clearBtn{
background:linear-gradient(135deg,#7b61ff,#5a8dee);
color:#fff;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.35);
display:none;
align-items:center;
justify-content:center;
padding:18px
}

.box{
background:#fff;
width:100%;
max-width:560px;
border-radius:18px;
padding:20px 18px 18px;
position:relative;
max-height:85vh;
overflow:auto;
box-shadow:0 10px 30px rgba(0,0,0,.15)
}

.closeX{
position:absolute;
top:10px;
right:12px;
font-size:20px;
color:#999;
cursor:pointer
}

.sentence{
margin-bottom:12px;
line-height:1.6;
cursor:pointer;
padding:4px 2px;
border-radius:6px
}

.sentence.active{
background:#e0f2f1
}

.translation{
color:#26a69a;
margin-top:6px;
margin-bottom:10px;
display:none;
line-height:1.55
}

/* ===== BUTTON ROW ===== */
.btnRow{
display:flex;
gap:12px;
margin-top:12px;
}

.btn{
flex:1;
height:54px;            /* tinggi sama */
border:none;
border-radius:14px;
font-size:17px;
}

.btnRead{
background:#26a69a;
color:#fff;
}

.btnClear{
background:linear-gradient(135deg,#7b61ff,#5a8dee);
color:#fff;
}

.btnImport{
  background:#2f86d6;
  color:#fff;
}

</style>
</head>

<body>

<header>
<h1>📘 Reading Lab</h1>
<div class="lab">LAB VERSION</div>
</header>

<div class="main">
<textarea id="inputText" placeholder="Paste English text..."></textarea>

<div class="btnRow">
  <button class="btn btnClear" onclick="clearText()">🧹 Clear</button>
  <button class="btn btnRead" onclick="openReader()">📖 Read</button>
  <button class="btn btnImport" onclick="document.getElementById('imgInput').click()">📥 Import</button>
</div>

<input type="file" id="imgInput" accept="image/*" style="display:none">

</div>

<div class="modal" id="readerModal">
<div class="box">

<div style="display:flex;gap:10px;margin-bottom:10px">
  <button class="btn btnRead" onclick="playAll()">🔊 Play All</button>
  <button class="btn btnClear" onclick="stopSpeak()">⏹ Stop</button>
</div>

<div class="closeX" onclick="closeReader()">✕</div>

<div id="reader"></div>

</div>
</div>

<script>
let sentences=[]

function openReader(){
const text=document.getElementById("inputText").value.trim()
if(!text)return

splitSentences(text)
renderSentences()

document.getElementById("readerModal").style.display="flex"
}

function closeReader(){
document.getElementById("readerModal").style.display="none"
}

function splitSentences(text){
sentences = text
.replace(/\n/g," ")
.match(/[^\.!\?]+[\.!\?]+/g) || [text]
}

function renderSentences(){
const box=document.getElementById("reader")
box.innerHTML=""

sentences.forEach((s,i)=>{
const wrap=document.createElement("div")
wrap.className="sentence"
wrap.innerText=s.trim()
wrap.onclick=()=>{
  selectSentence(i)
  speak(sentences[i])
}

const trans=document.createElement("div")
trans.className="translation"
trans.id="tr"+i

wrap.appendChild(trans)
box.appendChild(wrap)
})
}

function selectSentence(i){
document.querySelectorAll(".sentence").forEach(s=>s.classList.remove("active"))
document.querySelectorAll(".translation").forEach(t=>t.style.display="none")

const sent=document.querySelectorAll(".sentence")[i]
const trans=document.getElementById("tr"+i)

sent.classList.add("active")
trans.style.display="block"
trans.innerText="Translating..."

fetch("https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=id&dt=t&q="+encodeURIComponent(sentences[i]))
.then(r=>r.json())
.then(data=>{
let hasil=""
data[0].forEach(b=>hasil+=b[0])
trans.innerText=hasil
})
}

function clearText(){
  const el = document.getElementById("inputText");
  el.value = "";
  el.focus();
}

let synth = window.speechSynthesis
let speakingAll = false

function speak(text){
  if(!text) return
  synth.cancel()

  const utter = new SpeechSynthesisUtterance(text)
  utter.lang = "en-US"
  utter.rate = 0.9
  synth.speak(utter)
}

function stopSpeak(){
  speakingAll = false
  synth.cancel()
}

function playAll(){
  if(!sentences.length) return
  speakingAll = true
  synth.cancel()

  let i = 0

  function next(){
    if(!speakingAll || i >= sentences.length) return

    const utter = new SpeechSynthesisUtterance(sentences[i])
    utter.lang = "en-US"
    utter.rate = 0.9

    utter.onend = ()=>{
      i++
      next()
    }

    synth.speak(utter)
  }

  next()
}

document.getElementById("imgInput").addEventListener("change", handleImage)

async function handleImage(e){
  const file = e.target.files[0]
  if(!file) return

  const { data:{ text } } = await Tesseract.recognize(
    file,
    "eng"
  )

  if(!text.trim()) return

  document.getElementById("inputText").value = text.trim()
}


</script>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

</body>
</html>
